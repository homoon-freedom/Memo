<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정리</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f5f6fa;
            --editor-bg: #ffffff;
            --sidebar-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --border-color: #dcdde1;
            --primary-dark: #2c3e50;
            --accent-green: #27ae60;
            --item-bg: #ffffff;
            --sidebar-width: 260px;
            --ios-blue: #82caff;
            --ios-white: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --editor-bg: #1c1c1e;
                --sidebar-bg: #1c1c1e;
                --text-main: #ffffff;
                --text-sub: #8e8e93;
                --border-color: #38383a;
                --primary-dark: #34495e;
                --accent-green: #32d74b;
                --item-bg: #2c2c2e;
            }
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        /* 사이드바 숨김 처리 */
        body.sidebar-hidden .sidebar {
            margin-right: calc(var(--sidebar-width) * -1);
            opacity: 0;
            visibility: hidden;
        }

        .editor-container {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background-color: var(--editor-bg);
            border-right: 1px solid var(--border-color);
            transition: background-color 0.3s ease;
            position: relative;
        }

        .category-management {
            display: flex; gap: 10px; align-items: center; margin-bottom: 15px;
            padding-right: 50px; /* 버튼과 겹침 방지 */
        }

        .category-select {
            padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-color);
            font-size: 0.9rem; outline: none; background-color: var(--item-bg); color: var(--text-main);
        }

        .btn-manage-cat {
            background: var(--item-bg); font-size: 0.8rem; padding: 8px 12px;
            border-radius: 6px; cursor: pointer; border: 1px solid var(--border-color); color: var(--text-main);
        }

        .title-input {
            width: 100%; border: none; border-bottom: 2px solid var(--border-color);
            font-size: 1.5rem; font-weight: bold; margin-bottom: 20px;
            padding: 15px 0; outline: none; background: transparent; color: var(--text-main);
        }

        .notepad {
            flex: 1; width: 100%; border: none; 
            font-size: 1.0rem; line-height: 1.8; outline: none;
            background: transparent; color: var(--text-main);
            overflow-y: auto; white-space: pre-wrap; word-break: break-all;
        }

        .notepad:empty:before {
            content: attr(data-placeholder);
            color: var(--text-sub);
            cursor: text;
        }

        .blue-text { color: var(--ios-blue); font-weight: 500; }
        .inner-bracket { color: #d1d1d6; font-weight: normal; font-size: 0.95rem; }
        .bold-white-text { color: var(--ios-white); font-weight: 900; font-size: 1.2rem; display: inline-block; }

        .btn-group {
            display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;
        }

        button { padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--primary-dark); color: white; }
        .btn-cancel { background: #ff3b30; color: white; display: none; }
        .btn-share-txt { background: #fee500; color: #3c1e1e; }
        .btn-share-img { background: #007aff; color: white; }
        
        .is-editing .btn-cancel { display: block; }

        /* 사이드바 스타일 */
        .sidebar { 
            width: var(--sidebar-width); 
            background-color: var(--sidebar-bg); 
            display: flex; 
            flex-direction: column; 
            box-shadow: -2px 0 10px rgba(0,0,0,0.05); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .sidebar-header { 
            padding: 15px; 
            background: var(--primary-dark); 
            color: white; 
            font-size: 0.9rem; 
            font-weight: bold; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-toggle-side {
            background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; padding: 0 5px;
        }

        /* 우측 상단 열기 버튼 */
        .btn-floating-open {
            position: absolute;
            top: 40px; 
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--primary-dark);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 99;
            cursor: pointer;
            font-size: 1.1rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .btn-floating-open:hover { transform: scale(1.05); }

        body.sidebar-hidden .btn-floating-open { display: flex; }

        .memo-list { flex: 1; overflow-y: auto; padding: 8px; }
        .category-group { margin-bottom: 8px; border-bottom: 1px solid var(--border-color); }
        
        .category-header { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 6px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-weight: 800; 
            color: var(--accent-green);
        }
        
        .items-container { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .category-group.active .items-container { max-height: 2000px; padding-bottom: 10px; }
        
        .memo-item { 
            background: var(--item-bg); 
            border: 1px solid var(--border-color); 
            padding: 10px; 
            border-radius: 10px; 
            margin-top: 6px; 
            cursor: pointer; 
            position: relative; 
            transition: transform 0.1s;
        }
        .memo-item:active { transform: scale(0.98); }
        .memo-item.active { border-color: var(--accent-green); background-color: rgba(50, 215, 75, 0.1) !important; }
        
        .item-text-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 25px;
        }
        
        .delete-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #ff3b30; cursor: pointer; font-size: 1.2rem; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal-content { background: var(--editor-bg); padding: 30px; border-radius: 16px; width: 320px; color: var(--text-main); }

        #hidden-capture-box {
            position: absolute; left: -9999px; top: 0; width: 800px;
            background: white; padding: 40px; display: flex; flex-direction: column; box-sizing: border-box;
        }
        #hidden-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 25px; line-height: 1.3; color: #000; word-break: break-all; }
        #hidden-content { font-size: 1.0rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #333; }
        #hidden-content .blue-text { color: #82caff !important; }
        #hidden-content .bold-white-text { color: #ffffff !important; font-weight: bold !important; font-size: 1.2rem !important; }
    </style>
</head>

<body id="body-ctx">

    <div class="editor-container">
        <div class="btn-floating-open" onclick="toggleSidebar(false)" title="목록 열기">📂</div>

        <div class="category-management">
            <select id="memo-category" class="category-select" onchange="saveLastUsedCategory(this.value)"></select>
            <button class="btn-manage-cat" onclick="openModal()">⚙️ 카테고리 편집</button>
        </div>
        
        <input type="text" id="memo-title" class="title-input" placeholder="제목을 입력하세요">
        <div id="memo-content" class="notepad" contenteditable="true" data-placeholder="이곳에 내용을 기록하세요..."></div>

        <div class="btn-group">
            <button class="btn-share-txt" onclick="shareMemoText()">카톡(텍스트)</button>
            <button class="btn-share-img" onclick="shareMemoImage()">이미지 공유/저장</button>
            <button class="btn-cancel" onclick="cancelEdit()">작성 취소</button>
            <button class="btn-save" id="save-btn" onclick="saveMemo()">메모 저장</button>
        </div>
    </div>

    <div id="hidden-capture-box">
        <div id="hidden-title"></div>
        <div id="hidden-content"></div>
        <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px; color: #999; font-size: 0.8rem;">
            My Notepad Pro
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <span>나의 기록 저장소</span>
            <button class="btn-toggle-side" onclick="toggleSidebar(true)" title="목록 숨기기">×</button>
        </div>
        <div class="memo-list" id="memo-list"></div>
    </div>

    <div id="catModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top: 0;">카테고리 관리</h3>
            <div id="modal-cat-list" style="margin-bottom: 20px; max-height: 200px; overflow-y: auto;"></div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="new-cat-input" style="flex:1; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--item-bg); color: var(--text-main);">
                <button onclick="addCategory()" style="background: var(--accent-green); color: white; padding: 5px 15px;">추가</button>
            </div>
            <button onclick="closeModal()" style="width: 100%; margin-top: 20px; padding: 12px; background: var(--text-sub); color: white;">닫기</button>
        </div>
    </div>

<script>
    let memos = JSON.parse(localStorage.getItem('memos_persistent') || '[]');
    let categories = JSON.parse(localStorage.getItem('memos_categories_v2') || '["일반", "업무", "개인"]');
    let editingId = null;
    let openCategories = new Set();
    let lastUsedCategory = localStorage.getItem('last_used_category') || categories[0];

    const editor = document.getElementById('memo-content');
    let isComposing = false;

    // 사이드바 상태 제어
    function toggleSidebar(hide) {
        if (hide) {
            document.body.classList.add('sidebar-hidden');
            localStorage.setItem('sidebar_state', 'hidden');
        } else {
            document.body.classList.remove('sidebar-hidden');
            localStorage.setItem('sidebar_state', 'visible');
        }
    }

    if (localStorage.getItem('sidebar_state') === 'hidden') {
        document.body.classList.add('sidebar-hidden');
    }

    // 한글 조합 상태 감지
    editor.addEventListener('compositionstart', () => { isComposing = true; });
    editor.addEventListener('compositionend', (e) => { 
        isComposing = false; 
        applyBlueColor(e.target); 
    });

    // 키 입력 감지 (불렛포인트 변환)
    editor.addEventListener('keydown', function(e) {
        if (e.key === ' ') {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            const range = selection.getRangeAt(0);
            const node = range.startContainer;
            const offset = range.startOffset;

            if (node.nodeType === 3) {
                const textBefore = node.textContent.substring(0, offset);
                
                // * 입력 후 스페이스바를 누르면 • 로 변환
                if (textBefore.endsWith('*')) {
                    e.preventDefault();
                    const newText = textBefore.slice(0, -1) + '• ' + node.textContent.substring(offset);
                    node.textContent = newText;

                    const newRange = document.createRange();
                    newRange.setStart(node, offset + 1);
                    newRange.collapse(true);
                    selection.removeAllRanges();
                    selection.addRange(newRange);
                    
                    applyBlueColor(editor);
                    autoSaveDraft();
                }
            }
        }
    });

    editor.addEventListener('input', function(e) {
        if (isComposing) return;
        const lastChar = e.data;
        if (!lastChar || lastChar === ' ' || lastChar === ')' || lastChar === ']') {
            applyBlueColor(this);
        }
        autoSaveDraft();
    });

    // 괄호 색상 및 서식 적용
    function applyBlueColor(el) {
        const selection = window.getSelection();
        if (!selection.rangeCount) return;

        const range = selection.getRangeAt(0);
        const preSelectionRange = range.cloneRange();
        preSelectionRange.selectNodeContents(el);
        preSelectionRange.setEnd(range.startContainer, range.startOffset);
        const start = preSelectionRange.toString().length;

        const text = el.innerText;
        let result = "";
        let stack = [];

        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '(' || char === '[') {
                stack.push(char);
                let className = (stack.length === 1) ? 
                                (char === '(' ? "blue-text" : "bold-white-text") : 
                                "inner-bracket";
                result += `<span class="${className}">${char}`;
            } 
            else if (char === ')' || char === ']') {
                if (stack.length > 0) {
                    result += `${char}</span>`;
                    stack.pop();
                } else {
                    result += char;
                }
            } 
            else {
                result += char;
            }
        }

        if (el.innerHTML !== result) {
            el.innerHTML = result;
            restoreCursor(el, start);
        }
    }

    function restoreCursor(el, count) {
        const range = document.createRange();
        const sel = window.getSelection();
        let charCount = 0;
        let nodeStack = [el];
        let node, found = false;

        while (!found && (node = nodeStack.pop())) {
            if (node.nodeType === 3) {
                const nextCharCount = charCount + node.length;
                if (count <= nextCharCount) {
                    range.setStart(node, count - charCount);
                    range.collapse(true);
                    found = true;
                }
                charCount = nextCharCount;
            } else {
                let i = node.childNodes.length;
                while (i--) nodeStack.push(node.childNodes[i]);
            }
        }
        sel.removeAllRanges();
        sel.addRange(range);
    }

    function autoSaveDraft() {
        if (editingId) return;
        const draft = {
            title: document.getElementById('memo-title').value,
            content: editor.innerText,
            category: document.getElementById('memo-category').value
        };
        localStorage.setItem('memo_draft_v2', JSON.stringify(draft));
    }

    function loadDraft() {
        const draftStr = localStorage.getItem('memo_draft_v2');
        if (draftStr) {
            const draft = JSON.parse(draftStr);
            if (draft.title || draft.content) {
                if (confirm("작성 중이던 초안이 있습니다. 불러오시겠습니까?")) {
                    document.getElementById('memo-title').value = draft.title || '';
                    editor.innerText = draft.content || '';
                    applyBlueColor(editor);
                    document.getElementById('memo-category').value = categories.includes(draft.category) ? draft.category : categories[0];
                } else {
                    localStorage.removeItem('memo_draft_v2');
                }
            }
        }
    }

    document.getElementById('memo-title').addEventListener('input', autoSaveDraft);
    document.getElementById('memo-category').addEventListener('change', autoSaveDraft);

    async function shareMemoText() {
        const title = document.getElementById('memo-title').value.trim();
        const content = editor.innerText.trim();
        if (!content) return alert("내용이 없습니다.");
        const fullText = title ? `[${title}]\n${content}` : content;
        if (navigator.share) await navigator.share({ title: '메모 공유', text: fullText });
        else { await navigator.clipboard.writeText(fullText); alert("복사되었습니다."); }
    }

    async function shareMemoImage() {
        const titleVal = document.getElementById('memo-title').value.trim();
        const contentHTML = editor.innerHTML;
        const contentText = editor.innerText.trim();
        if(!contentText) return alert("공유할 내용이 없습니다.");
        
        const captureBox = document.getElementById('hidden-capture-box');
        document.getElementById('hidden-title').innerText = titleVal || "제목 없음";
        document.getElementById('hidden-content').innerHTML = contentHTML;
        
        try {
            const canvas = await html2canvas(captureBox, { backgroundColor: "#ffffff", scale: 2, logging: false, useCORS: true });
            const imageData = canvas.toDataURL("image/png");
            const fileName = (titleVal || 'memo') + ".png";
            if (navigator.canShare && navigator.share) {
                const blob = await (await fetch(imageData)).blob();
                const file = new File([blob], fileName, { type: 'image/png' });
                try { await navigator.share({ files: [file], title: titleVal }); } catch (e) { downloadImage(imageData, fileName); }
            } else { downloadImage(imageData, fileName); }
        } catch (err) { alert("이미지 생성 실패"); }
    }

    function downloadImage(data, filename) {
        const link = document.createElement('a');
        link.href = data; link.download = filename; link.click();
    }

    function updateCategoryUI() {
        const select = document.getElementById('memo-category');
        select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        select.value = categories.includes(lastUsedCategory) ? lastUsedCategory : categories[0];
        document.getElementById('modal-cat-list').innerHTML = categories.map(c => `
            <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.95rem;">
                <span>${c}</span><span style="color:#ff3b30; cursor:pointer; font-weight:bold;" onclick="deleteCategory('${c}')">삭제</span>
            </div>
        `).join('');
        localStorage.setItem('memos_categories_v2', JSON.stringify(categories));
        render();
    }

    function addCategory() {
        const val = document.getElementById('new-cat-input').value.trim();
        if(val && !categories.includes(val)) { categories.push(val); document.getElementById('new-cat-input').value=''; updateCategoryUI(); }
    }

    function deleteCategory(cat) {
        if(categories.length <= 1) return;
        if(confirm(`'${cat}' 카테고리를 삭제하시겠습니까?`)) {
            categories = categories.filter(c => c !== cat);
            updateCategoryUI();
        }
    }

    function render() {
        const listDiv = document.getElementById('memo-list');
        listDiv.innerHTML = '';
        const grouped = {};
        categories.forEach(cat => grouped[cat] = []);
        memos.forEach(m => {
            const catKey = categories.includes(m.category) ? m.category : categories[0];
            grouped[catKey].push(m);
        });

        categories.forEach(cat => {
            const groupDiv = document.createElement('div');
            groupDiv.className = `category-group ${openCategories.has(cat) ? 'active' : ''}`;
            groupDiv.innerHTML = `
                <div class="category-header" onclick="toggleCategory('${cat}')">
                    <span>${cat} (${grouped[cat].length})</span><span>${openCategories.has(cat) ? '▲' : '▼'}</span>
                </div>
                <div class="items-container"></div>
            `;
            const container = groupDiv.querySelector('.items-container');
            grouped[cat].sort((a, b) => b.id - a.id).forEach(m => {
                const item = document.createElement('div');
                item.className = `memo-item ${editingId === m.id ? 'active' : ''}`;
                item.onclick = () => startEdit(m.id);
                item.innerHTML = `
                    <div class="item-text-title">${m.title || '제목 없음'}</div>
                    <div style="font-size:0.7rem; color:var(--text-sub); margin-top:4px;">${m.date}</div>
                    <button class="delete-btn" onclick="deleteMemo(event, ${m.id})">×</button>
                `;
                container.appendChild(item);
            });
            listDiv.appendChild(groupDiv);
        });
    }

    function toggleCategory(cat) { openCategories.has(cat) ? openCategories.delete(cat) : openCategories.add(cat); render(); }

    function saveMemo() {
        const cat = document.getElementById('memo-category').value;
        const title = document.getElementById('memo-title').value.trim();
        const content = editor.innerText;
        if(!title && !content.trim()) return alert("내용을 입력해주세요.");
        
        const dateStr = new Date().toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        
        if(editingId) {
            memos = memos.map(m => m.id === editingId ? { ...m, category:cat, title, content, date: dateStr + ' (수정)' } : m);
        } else {
            memos.push({ id: Date.now(), category:cat, title, content, date: dateStr });
        }
        
        localStorage.setItem('memos_persistent', JSON.stringify(memos));
        localStorage.removeItem('memo_draft_v2');
        cancelEdit(true);
        updateCategoryUI();
    }

    function startEdit(id) {
        const m = memos.find(memo => memo.id === id);
        if(m) {
            editingId = id;
            document.getElementById('memo-category').value = m.category;
            document.getElementById('memo-title').value = m.title;
            editor.innerText = m.content;
            applyBlueColor(editor);
            document.getElementById('body-ctx').classList.add('is-editing');
            render();
        }
    }

    function cancelEdit(force = false) {
        if (force || confirm("작성 중인 내용을 취소하시겠습니까?")) {
            editingId = null;
            document.getElementById('memo-title').value = '';
            editor.innerText = '';
            document.getElementById('body-ctx').classList.remove('is-editing');
            localStorage.removeItem('memo_draft_v2');
            render();
        }
    }

    function deleteMemo(e, id) { 
        e.stopPropagation(); 
        if(confirm("이 메모를 삭제하시겠습니까?")) {
            memos = memos.filter(m => m.id !== id); 
            localStorage.setItem('memos_persistent', JSON.stringify(memos)); 
            render(); 
        }
    }
    
    function openModal() { document.getElementById('catModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('catModal').style.display = 'none'; }
    function saveLastUsedCategory(cat) { localStorage.setItem('last_used_category', cat); }

    updateCategoryUI();
    loadDraft();
</script>
</body>
</html>
